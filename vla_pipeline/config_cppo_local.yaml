# CPPPO: Causal Protocol PPO — finetune official teachers on eval protocol distribution.

cppo:
  version: v1
  checkpoint_dir: /home/work/l30083605/Casual-World-project/data/cppo_checkpoints
  # Finetune from bundled baseline actors (PPO2 zips).
  init_checkpoints:
    pushing: /home/work/l30083605/Casual-World-project/causal_world/assets/baseline_actors/pushing_ppo_curr1.zip
    picking: /home/work/l30083605/Casual-World-project/causal_world/assets/baseline_actors/picking_ppo_curr1.zip
    pick_and_place: /home/work/l30083605/Casual-World-project/causal_world/assets/baseline_actors/pick_and_place_ppo_curr0.zip
  num_envs: 32
  num_envs_by_task:
    pushing: 32
    picking: 32
    pick_and_place: 32
  seed: 42
  skip_frame: 3
  # Total env steps across all parallel envs (finetune; not full 100M pretrain).
  total_timesteps: 2000000
  validate_every_timesteps: 200000
  tasks: [pushing, picking, pick_and_place]

  ppo:
    gamma: 0.99
    n_steps: 6000
    ent_coef: 0.01
    learning_rate: 0.0001
    vf_coef: 0.5
    max_grad_norm: 0.5
    nminibatches: 0  # 0 = auto (2x num_envs, capped at 64)
    noptepochs: 4
    net_arch: [256, 256]

  # Per-protocol sampling weight during training (hard protocols upweighted).
  protocol_weights:
    pushing:
      "*": 1.0
      P6: 3.0
      P7: 3.0
      P8: 3.0
      P9: 3.0
      P10: 2.5
      P11: 3.0
    picking:
      "*": 1.0
      P6: 3.0
      P7: 3.0
      P8: 3.0
      P9: 3.0
      P10: 2.5
      P11: 3.0
    pick_and_place:
      "*": 1.5
      P1: 2.0
      P2: 2.5
      P3: 2.0
      P4: 2.0
      P5: 2.5
      P6: 3.0
      P7: 3.0
      P8: 3.0
      P9: 3.0
      P10: 2.5

  task_configs:
    pushing:
      fractional_reward_weight: 1.0
      dense_reward_weights: [750, 250, 0]
    picking:
      fractional_reward_weight: 1.0
      dense_reward_weights: [250, 0, 125, 0, 750, 0, 0, 0.005]
    pick_and_place:
      fractional_reward_weight: 1.0
      dense_reward_weights: [750, 50, 250, 0, 0.005]

evaluation:
  skip_frame: 3
  fraction: 0.1
  episodes_per_protocol_fast: 20
  output_dir: /home/work/l30083605/Casual-World-project/data/cppo_eval
