# CPPPO v3 Stage-2a — pick_and_place only (primary bottleneck for +15% target).
#
# v3 s1 full eval: push=0.698, pick=0.712 → partial global ~0.553 (+10.7%)
# With v2 pap full (0.285): projected global ~0.565 (+13.2%), gap to 0.5743 = -0.009
# pap task_macro need: ~0.312 (+0.027 over v2 pap)

cppo:
  version: v3
  stage: 2
  checkpoint_dir: /home/work/l30083605/Casual-World-project/data/cppo_checkpoints_v3_stage2_pap
  init_checkpoints:
    pick_and_place: /home/work/l30083605/Casual-World-project/data/cppo_checkpoints_v3_stage1/pick_and_place/pick_and_place_cppo_v3.zip
  num_envs: 20
  seed: 42
  skip_frame: 3
  variables_space: space_a_b
  total_timesteps: 15000000
  validate_every_timesteps: 3000000
  resume: true
  tasks: [pick_and_place]
  warm_start_baseline: false

  protocol_allowlist_by_task:
    pick_and_place: [P0, P1, P2, P3, P4, P5, P6, P7, P8, P9, P10, P11]

  sampling:
    adaptive: true
    adaptive_alpha: 2.2
    adaptive_momentum: 0.88
    hard_protocol_min_weight: 0.20
    stratified_static_ratio: 0.45

  anchor_protocols: [P0, P1, P2, P3]
  anchor_min_sampling_ratio: 0.30

  policy:
    type: residual
    embed_dim: 64
    proto_scale: 1.0
    net_arch:
      - pi: [256, 256]
        vf: [256, 256]

  ppo:
    gamma: 0.99
    n_steps: 2048
    ent_coef: 0.008
    learning_rate: 0.00004
    vf_coef: 0.5
    max_grad_norm: 0.5
    nminibatches: 40
    noptepochs: 4

  protocol_weights:
    pick_and_place:
      "*": 1.0
      P0: 3.0
      P1: 2.5
      P2: 2.5
      P3: 2.5
      P4: 4.0
      P5: 4.0
      P6: 5.0
      P7: 5.0
      P8: 5.0
      P9: 5.0
      P10: 4.5
      P11: 4.5

  task_configs:
    pick_and_place:
      fractional_reward_weight: 1.0
      dense_reward_weights: [750, 50, 250, 0, 0.005]

evaluation:
  skip_frame: 3
  fraction: 0.1
  output_dir: /home/work/l30083605/Casual-World-project/data/cppo_eval_v3_stage2_pap
