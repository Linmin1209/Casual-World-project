# V2: reuse existing 900 episodes + targeted re-collection (no full re-run required)
# Target macro avg: 0.574 (+15% vs baseline 0.499)

data:
  output_dir: /data1/linmin/CausalWorld/data/vla_demos
  export_dir: /data1/linmin/CausalWorld/data/vla_train_v2
  # Phase A: re-export from disk (no sim)
  include_rejected: true
  export_mode: step_filter          # step_filter | episode_filter
  min_step_fractional_success: 0.05 # keep steps with fs >= this (900 eps -> ~27k useful steps)
  min_episode_max_fractional_success: 0.0  # optional episode pre-filter; 0 = off
  subsample_every_n_steps: 1        # use all steps (was 2; ~2x data)

  # Phase B: supplementary collection (only if Phase A eval still low)
  tasks: [pushing, picking, pick_and_place]
  protocols: [P0, P1, P2, P3, P4, P5]   # teacher strong; stabilizes VLA
  hard_protocols: [P6, P7, P8, P9, P10, P11]
  episodes_per_protocol: 30
  episodes_per_hard_protocol: 30
  min_fractional_success: 0.0         # episode filter disabled for hard; use step_filter on export
  log_every_steps: 25
  quiet_intervention_logs: true
  skip_existing: true                 # don't redo completed ep_XXXX folders
  num_workers: 6
  gpu_ids: []
  camera_indices: [0, 1, 2]
  image_size: 128

teacher:
  checkpoints:
    pushing: null
    picking: null
    pick_and_place: null

training:
  checkpoint_dir: /data1/linmin/CausalWorld/data/vla_checkpoints_v2
  model_type: resnet_film_flow
  action_horizon: 8              # predict 8-step action chunks (9-d each)
  num_views: 3
  lang_dim: 256
  fm_hidden: 512
  fm_sample_steps: 10            # ODE steps at inference
  batch_size: 48                 # GPU has headroom (~17GB used / 24GB)
  epochs: 50
  lr: 0.0003                     # legacy fallback
  lr_head: 0.0003                # FiLM + flow head + text
  lr_backbone: 0.00005           # fine-tune ResNet slower
  lr_min: 0.000001
  cosine_lr: true
  weight_decay: 0.0001
  grad_clip: 1.0
  val_ratio: 0.1
  split_seed: 42
  image_size: 128
  num_workers: 4
  loss_weight_by_fs: true
  aux_denoise_loss_weight: 0.4   # direct action regression accelerates convergence
  freeze_backbone_epochs: 3
  early_stop_patience: 15
  best_checkpoint_metric: val_cfm_w
  action_mse_eval_batches: 20
  action_mse_eval_every: 5        # ODE sampling is slow; eval every 5 epochs

hybrid:
  # task-specific alpha (hard tasks rely more on teacher early on)
  alpha_default: 0.5
  alpha_by_task:
    pushing: 0.75
    picking: 0.80
    pick_and_place: 0.85
  checkpoint: /data1/linmin/CausalWorld/data/vla_checkpoints_v2/bc_best.pt

evaluation:
  output_dir: /data1/linmin/CausalWorld/data/vla_eval_v2
  baseline_dir: /data1/linmin/CausalWorld/baseline_eval
  fraction: 1.0
  episodes_per_protocol: 200
  num_workers: 6              # parallel PyBullet envs (1 worker per GPU recommended)
  gpu_ids: [0, 1, 2, 3, 4, 5]
  target_macro_avg: 0.574

dagger:
  rounds: 2
  episodes_per_protocol: 15
  alpha: 0.6
