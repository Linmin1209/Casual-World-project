dagger:
  episodes_per_protocol: 30
  gpu_ids:
  - 4
  - 5
  log_every_episodes: 5
  num_workers: 2
  protocols_by_task:
    picking:
    - P11
    pushing:
    - P7
    - P10
    - P11
  quiet: true
  rounds: 1
  seed_offset: 6000
  skip_existing: true
  skip_frame: 10
  tasks:
  - pushing
  - picking
data:
  dagger_include:
    picking:
    - P11
    pushing:
    - P7
    - P10
    - P11
  export_dir: /data1/linmin/CausalWorld/data/vla_train_v5
  include_rejected: true
  min_dagger_episode_max_fractional_success: 0.05
  min_episode_max_fractional_success: 0.0
  min_step_fractional_success: 0.05
  output_dir: /data1/linmin/CausalWorld/data/vla_demos
  subsample_every_n_steps: 1
  tasks:
  - pushing
  - picking
  - pick_and_place
evaluation:
  baseline_dir: /data1/linmin/CausalWorld/baseline_eval
  batch_workers: true
  episodes_per_protocol: 200
  episodes_per_protocol_fast: 50
  fast_eval: true
  fraction: 1.0
  gpu_ids:
  - 4
  - 5
  log_every_episodes: 5
  num_workers: 2
  output_dir: /data1/linmin/CausalWorld/data/vla_eval_v5
  skip_frame: 10
  target_macro_avg: 0.574
hybrid:
  beta_by_task_protocol:
    pick_and_place:
      P10: 0.1
      P11: 0.1
      P6: 0.0
      P7: 0.0
      P8: 0.0
      P9: 0.0
    picking:
      P10: 0.1
      P11: 0.25
      P6: 0.0
      P7: 0.0
      P8: 0.0
      P9: 0.0
    pushing:
      P10: 0.3
      P11: 0.3
      P6: 0.0
      P7: 0.2
      P8: 0.15
      P9: 0.15
  beta_default: 0.0
  beta_easy: 0.0
  blend_mode: residual
  checkpoint: /data1/linmin/CausalWorld/data/vla_checkpoints_v5/bc_best_r00.pt
  max_correction: 0.15
teacher:
  checkpoints:
    pick_and_place: null
    picking: null
    pushing: null
training:
  action_horizon: 1
  action_mse_eval_batches: 30
  action_mse_eval_every: 5
  augment_train: true
  batch_size: 64
  best_checkpoint_metric: val_mse_w_hard
  checkpoint_dir: /data1/linmin/CausalWorld/data/vla_checkpoints_v5
  cosine_lr: true
  dagger_sample_weight: 1.5
  dropout: 0.2
  early_stop_patience: 8
  epochs: 25
  fm_hidden: 512
  freeze_backbone_epochs: 6
  grad_clip: 1.0
  hard_protocols:
  - P6
  - P7
  - P8
  - P9
  - P10
  - P11
  image_size: 128
  init_checkpoint: /data1/linmin/CausalWorld/data/vla_checkpoints_v5/bc_best_r00.pt
  lang_dim: 256
  loss_weight_by_fs: true
  lr_backbone: 1.0e-05
  lr_head: 5.0e-05
  lr_min: 1.0e-06
  model_type: resnet_film_mse
  num_views: 3
  num_workers: 4
  protocol_sample_weights:
    picking:
      '*': 1.0
      P11: 2.0
      P8: 2.5
      P9: 2.5
    pushing:
      '*': 1.0
      P10: 3.0
      P11: 3.0
  round: 0
  split_seed: 42
  val_ratio: 0.1
  weight_decay: 0.001
